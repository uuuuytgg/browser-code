name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        working-directory: opencode
        run: bun install

      - name: Build opencode binary
        working-directory: opencode/packages/opencode
        run: bun run script/build.ts --single

      - name: Rename binary for release
        shell: bash
        working-directory: opencode/packages/opencode/dist/opencode-${{ matrix.platform }}-${{ matrix.arch }}/bin
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            mv opencode.exe opencode-${{ matrix.platform }}-${{ matrix.arch }}.exe
          else
            mv opencode opencode-${{ matrix.platform }}-${{ matrix.arch }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            opencode/packages/opencode/dist/opencode-${{ matrix.platform }}-${{ matrix.arch }}/bin/opencode-*
